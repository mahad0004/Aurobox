    .iframe-container { position:relative; padding-top:56.25%; }

    ];

    // Helper to build thumbnail URL (replace this base URL with your actual CDN if different)
    const getThumbnail = (th) => {
      return `https://res.cloudinary.com/demo/image/upload/${th}.jpg`; // ← CHANGE THIS to your real CDN
      // Example alternatives:
      // return `https://your-cdn.com/thumbs/${th}.webp`;
      // return `https://picsum.photos/id/${parseInt(th, 36) % 1000}/300/200`;
    };

    function GameHub() {
      const [searchTerm, setSearchTerm] = React.useState("");
      const [selectedGame, setSelectedGame] = React.useState(null);
      const [filteredGames, setFilteredGames] = React.useState(BASE_GAMES);

      // Live search + category filter
      useEffect(() => {
        const term = searchTerm.toLowerCase().trim();
        const filtered = BASE_GAMES.filter(game => {
          return (
            game.t.toLowerCase().includes(term) ||
            game.d.toLowerCase().includes(term) ||
            game.c.some(cat => cat.toLowerCase().includes(term))
          );
        });
        setFilteredGames(filtered);
      }, [searchTerm]);

      const openGame = (game) => setSelectedGame(game);
      const closeGame = () => setSelectedGame(null);

      return React.createElement("div", { className: "container" },
        // Header
        React.createElement("div", { className: "header" },
          React.createElement("h1", { style: { fontSize: "32px", fontWeight: 700, color: "var(--primary)" } }, "🎮 GameHub"),
          React.createElement("input", {
            type: "text",
            placeholder: "Search 1200+ games... (e.g. bloxd, krunker, tank)",
            className: "search",
            value: searchTerm,
            onChange: (e) => setSearchTerm(e.target.value)
          }),
          React.createElement("div", { style: { color: "#666", fontSize: "14px" } }, `${filteredGames.length} games`)
        ),

        // Game Grid
        React.createElement("div", { className: "grid" },
          filteredGames.map((g) =>
            React.createElement("div", {
              key: g.t,
              className: "game-card",
              onClick: () => openGame(g)
            },
              React.createElement("img", {
                src: getThumbnail(g.th),
                alt: g.t,
                className: "thumb",
                onError: (e) => { e.target.src = "https://via.placeholder.com/300x200/111/fff?text=Game"; }
              }),
              React.createElement("div", { className: "info" },
                React.createElement("div", { className: "title" }, g.t),
                React.createElement("div", { className: "desc" }, g.d)
              )
            )
          )
        ),

        // Game Modal (Iframe)
        selectedGame && React.createElement("div", { className: "modal", onClick: (e) => e.target.className === "modal" && closeGame() },
          React.createElement("div", { className: "modal-content" },
            React.createElement("div", { className: "close", onClick: closeGame }, "✕"),
            React.createElement("div", { style: { padding: "20px 30px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #222" } },
              React.createElement("h2", { style: { fontSize: "24px" } }, selectedGame.t),
              React.createElement("a", {
                href: selectedGame.u,

                style: { color: "var(--primary)", textDecoration: "none", fontSize: "15px" }
              }, "Open in new tab →")
            ),
            React.createElement("div", { className: "iframe-container" },
              React.createElement("iframe", {
