<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonely - Free Online Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#13131f;--bg4:#1a1a2e;
  --border:#1e1e30;
  --purple:#7c3aed;--pl:#9b5cf6;
  --pdim:rgba(124,58,237,0.15);--pglow:rgba(124,58,237,0.3);
  --text:#f0f0f8;--muted:#7070a0;--dim:#4a4a70;
  --r:14px;--rl:20px;
  --sw:240px;--sc:66px;--hh:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--purple)}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:rgba(8,8,16,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200;
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);flex-shrink:0}
.logo-icon{
  width:34px;height:34px;background:var(--purple);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#fff;
  flex-shrink:0;box-shadow:0 0 18px var(--pglow);
}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.4px;white-space:nowrap}
#sb-tog{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--pl);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
#sb-tog:hover{background:var(--pdim);border-color:var(--purple)}
.srch{
  flex:1;max-width:500px;margin:0 auto;
  display:flex;align-items:center;gap:9px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:0 13px;height:38px;transition:border-color .2s;
}
.srch:focus-within{border-color:var(--purple)}
.srch i{color:var(--muted);font-size:13px;flex-shrink:0}
.srch input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:13.5px;min-width:0}
.srch input::placeholder{color:var(--dim)}
.hacts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hbtn{
  width:36px;height:36px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;position:relative;flex-shrink:0;
}
.hbtn:hover{color:var(--text);border-color:var(--purple);background:var(--pdim)}
.hbtn.fav{padding:0 11px;width:auto;gap:6px;font-size:13px;font-weight:600}
.badge{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#ef4444;border:1.5px solid var(--bg)}

/* SIDEBAR */
#sb{
  position:fixed;left:0;top:var(--hh);
  width:var(--sc);height:calc(100vh - var(--hh));
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:100;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
#sb:hover,body.sbo #sb{width:var(--sw)}
.snav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 7px}
.snav::-webkit-scrollbar{width:0}
.si{
  display:flex;align-items:center;gap:11px;
  padding:9px 10px;border-radius:9px;cursor:pointer;
  white-space:nowrap;color:var(--muted);
  transition:all .2s;margin-bottom:2px;
}
.si:hover{color:var(--text);background:var(--bg3)}
.si.active{color:var(--pl);background:var(--pdim)}
.sic{
  width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-size:14px;
  background:var(--bg3);color:var(--pl);transition:background .2s;
}
.si:hover .sic{background:var(--bg4)}
.si.active .sic{background:var(--pdim)}
.sil{font-size:13px;font-weight:500;opacity:0;transition:opacity .15s .05s;pointer-events:none}
#sb:hover .sil,body.sbo #sb .sil{opacity:1}

/* MAIN */
#main{margin-left:var(--sc);margin-top:var(--hh);transition:margin-left .3s ease;min-height:calc(100vh - var(--hh))}
body.sbo #main{margin-left:var(--sw)}

/* PAGES */
.page{display:none;padding:26px 24px}
.page.on{display:block;animation:pgIn .3s cubic-bezier(.4,0,.2,1)}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pgt{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.4px;margin-bottom:3px}
.pgs{color:var(--muted);font-size:13px;margin-bottom:28px}

/* HERO GRID */
.hgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:42px}
.hgrid .gc:first-child{grid-column:span 2;grid-row:span 2}
.hgrid .gc:nth-child(2){grid-column:span 2}

/* SECTION */
.sec{margin-bottom:40px}
.sechd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sect{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.3px}
.va{display:flex;align-items:center;gap:4px;color:var(--pl);font-size:12px;font-weight:500;cursor:pointer;background:none;border:none;transition:opacity .2s}
.va:hover{opacity:.7}
.rw{position:relative}
.sr{display:flex;gap:11px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;padding-bottom:6px}
.sr::-webkit-scrollbar{display:none}
.arr{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;z-index:5;
  opacity:0;pointer-events:none;transition:all .2s;
  box-shadow:0 4px 18px rgba(0,0,0,.5);
}
.rw:hover .arr{opacity:1;pointer-events:all}
.arr:hover{background:var(--purple);border-color:var(--purple)}
.arr.l{left:-13px}.arr.r{right:-13px}

/* GAME CARD */
.gc{
  flex-shrink:0;width:192px;cursor:pointer;
  border-radius:var(--r);overflow:hidden;background:var(--bg3);
  transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s;
}
.gc:hover{transform:scale(1.04);box-shadow:0 8px 28px rgba(124,58,237,.2)}
.hgrid .gc,.rgrid .gc,.cgrid .gc{width:auto}
.gt{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#0a0a14}
.gt img{width:100%;height:100%;object-fit:cover;display:block}
.gbadge{
  position:absolute;top:7px;left:7px;
  background:var(--purple);color:#fff;
  font-size:9px;font-weight:700;letter-spacing:.4px;
  padding:2px 7px;border-radius:5px;text-transform:uppercase;
}
.gcn{padding:8px 10px 5px;font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcm{padding:0 10px 9px;font-size:11px;color:var(--muted)}

/* RESULTS / CAT GRIDS */
.rgrid,.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}

/* GAME PAGE */
#gp.on{display:block}
.gpgrid{display:grid;grid-template-columns:150px 1fr 248px;gap:22px;align-items:start}
.adcol{display:flex;flex-direction:column;gap:14px;position:sticky;top:calc(var(--hh) + 22px)}
.adslot{
  background:var(--bg3);border:1px dashed var(--border);
  border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;text-align:center;
  color:var(--dim);font-size:10px;line-height:1.8;letter-spacing:.5px;text-transform:uppercase;
}
.adslot.t{height:260px}.adslot.m{height:200px}
.gctr{min-width:0}
.backbtn{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--pl);font-size:13px;font-weight:500;
  cursor:pointer;background:none;border:none;
  margin-bottom:14px;transition:opacity .2s;font-family:inherit;
}
.backbtn:hover{opacity:.7}
.gio{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--rl);overflow:hidden;background:#000;box-shadow:0 0 36px rgba(0,0,0,.6)}
.gio iframe{width:100%;height:100%;border:none;display:block}

/* FULLSCREEN BAR */
#fsbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,16,.93);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:none;align-items:center;justify-content:space-between;
  padding:10px 18px;gap:10px;z-index:99999;
}
#fsbar.on{display:flex}
.fbl{display:flex;align-items:center;gap:8px}
.fbr{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.fbt{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.fbt:hover{border-color:var(--purple);background:var(--pdim);color:var(--pl)}
.fbt.p{background:var(--purple);border-color:var(--purple);color:#fff}
.fbt.p:hover{background:#6d28d9}
.fbt i{font-size:11px}
.fbt-hide{background:transparent;border-color:var(--dim);color:var(--muted)}
.fbt-hide:hover{border-color:var(--border);color:var(--text);background:var(--bg3)}
.fsgametitle{font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:600;color:var(--text);padding:0 4px}

.gacts{display:flex;align-items:center;gap:9px;margin-top:14px;flex-wrap:wrap}
.gbtn{
  display:flex;align-items:center;gap:7px;
  padding:8px 15px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.gbtn:hover{border-color:var(--purple);background:var(--pdim);color:var(--pl)}
.gbtn.p{background:var(--purple);border-color:var(--purple);color:#fff}
.gbtn.p:hover{background:#6d28d9}
.gbtn i{font-size:12px}

.ginf{margin-top:26px}
.git{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-.4px}
.gmr{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.gmi{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.gmi i{color:var(--pl);font-size:12px}
.gdesc{font-size:14px;line-height:1.76;color:#c0c0d8;margin-bottom:26px}
.ytlbl{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.ytlbl i{color:#ef4444}
.ytwrap{width:100%;aspect-ratio:16/9;border-radius:var(--rl);overflow:hidden}
.ytwrap iframe{width:100%;height:100%;border:none}

.simcol{position:sticky;top:calc(var(--hh) + 22px)}
.simt{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.siml{display:flex;flex-direction:column;gap:9px;max-height:calc(100vh - var(--hh) - 60px);overflow-y:auto;scrollbar-width:none}
.siml::-webkit-scrollbar{display:none}
.simcard{
  display:flex;gap:9px;cursor:pointer;
  padding:7px;border-radius:9px;
  background:var(--bg3);border:1px solid transparent;transition:all .2s;
}
.simcard:hover{border-color:var(--border);background:var(--bg4)}
.simthumb{width:76px;height:48px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--bg4)}
.siminfo{flex:1;min-width:0}
.simname{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.simmeta{font-size:11px;color:var(--muted)}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center}
.ov.on{display:flex}
.mb{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:24px;width:90%;max-width:420px;animation:mp .25s cubic-bezier(.4,0,.2,1);max-height:84vh;overflow-y:auto}
.mb.wide{max-width:660px}
@keyframes mp{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mhd h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700}
.mcl{width:30px;height:30px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .2s}
.mcl:hover{color:var(--text);border-color:var(--purple)}
.ctbl{width:100%;border-collapse:collapse}
.ctbl td{padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.ctbl td:first-child{color:var(--muted);width:42%}
.kbd{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:11px;font-family:'Space Grotesk',sans-serif;color:var(--pl);margin:1px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.fitem{cursor:pointer;border-radius:9px;overflow:hidden;background:var(--bg3);border:1px solid transparent;transition:all .2s}
.fitem:hover{border-color:var(--purple)}
.fitem img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg4)}
.filab{padding:6px 9px;font-size:12px;font-weight:500}
.empty{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px}
.empty i{font-size:28px;margin-bottom:10px;display:block;color:var(--dim)}
.nlist{display:flex;flex-direction:column;gap:12px}
.ni{display:flex;gap:11px;align-items:flex-start;padding:11px;background:var(--bg3);border-radius:9px}
.nic{width:32px;height:32px;border-radius:8px;background:var(--pdim);display:flex;align-items:center;justify-content:center;color:var(--pl);flex-shrink:0;font-size:13px}
.nt{font-size:13px;line-height:1.5}
.ntm{font-size:11px;color:var(--muted);margin-top:3px}

/* TOAST */
#toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;padding:11px 16px;font-size:13px;font-weight:500;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  transform:translateY(70px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:9999;display:flex;align-items:center;gap:8px;
}
#toast.on{transform:translateY(0);opacity:1}
#toast i{color:var(--pl)}

@media(max-width:1100px){.gpgrid{grid-template-columns:0 1fr 220px}.adcol{display:none}}
@media(max-width:860px){.gpgrid{grid-template-columns:1fr}.simcol{position:static}.siml{max-height:none;flex-direction:row;flex-wrap:wrap}.simcard{width:calc(50% - 5px)}}
@media(max-width:640px){
  .page{padding:16px 12px}
  .hgrid{grid-template-columns:repeat(2,1fr)}
  .hgrid .gc:first-child{grid-column:span 2;grid-row:span 1}
  .hgrid .gc:nth-child(2){grid-column:span 1}
  .logo-text{display:none}
  .srch{max-width:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <a class="logo" href="#" onclick="goHome();return false">
    <div class="logo-icon">Z</div>
    <span class="logo-text">Zonely</span>
  </a>
  <button id="sb-tog" onclick="toggleSB()" title="Toggle sidebar">
    <i class="fa-solid fa-bars" id="sb-icon"></i>
  </button>
  <div class="srch">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="si" type="text" placeholder="Search games — gun, soccer, racing, puzzle..." onkeyup="if(event.key==='Enter')doSearch()">
  </div>
  <div class="hacts">
    <button class="hbtn" onclick="openNotifs()" title="Notifications"><i class="fa-solid fa-bell"></i><span class="badge"></span></button>
    <button class="hbtn fav" onclick="openFavs()" title="Favorites"><i class="fa-solid fa-heart"></i><span id="fc">0</span></button>
    <button class="hbtn" onclick="toggleUser()" title="Profile"><i class="fa-solid fa-circle-user" id="uico" style="font-size:17px;color:var(--pl)"></i></button>
  </div>
</header>

<!-- SIDEBAR -->
<nav id="sb"><div class="snav" id="snav"></div></nav>

<!-- FULLSCREEN BAR -->
<div id="fsbar">
  <div class="fbl"><span class="fsgametitle" id="fsgt"></span></div>
  <div class="fbr">
    <button class="fbt" onclick="likeGame()"><i class="fa-solid fa-heart"></i> Like</button>
    <button class="fbt" onclick="openControls()"><i class="fa-solid fa-keyboard"></i> Controls</button>
    <button class="fbt" onclick="shareGame()"><i class="fa-solid fa-share-nodes"></i> Share</button>
    <button class="fbt p" onclick="exitFS()"><i class="fa-solid fa-compress"></i> Exit Fullscreen</button>
    <button class="fbt fbt-hide" onclick="hideBar()"><i class="fa-solid fa-eye-slash"></i> Hide this bar</button>
  </div>
</div>

<!-- MAIN -->
<main id="main">

  <!-- HOME PAGE -->
  <div id="hp" class="page on"></div>

  <!-- GAME PAGE -->
  <div id="gp" class="page">
    <div class="gpgrid">
      <div class="adcol">
        <div class="adslot t">AD<br>160×600</div>
        <div class="adslot m">AD<br>160×300</div>
      </div>
      <div class="gctr">
        <button class="backbtn" onclick="goHome()"><i class="fa-solid fa-chevron-left"></i> Back to Games</button>
        <div class="gio" id="gio"></div>
        <div class="gacts">
          <button class="gbtn" onclick="likeGame()"><i class="fa-solid fa-heart"></i> Like</button>
          <button class="gbtn" onclick="openControls()"><i class="fa-solid fa-keyboard"></i> Controls</button>
          <button class="gbtn p" onclick="shareGame()"><i class="fa-solid fa-share-nodes"></i> Share</button>
          <button class="gbtn" onclick="goFS()" id="fsbtn"><i class="fa-solid fa-expand"></i> Fullscreen</button>
        </div>
        <div class="ginf">
          <h2 class="git" id="gt"></h2>
          <div class="gmr" id="gm"></div>
          <p class="gdesc" id="gd"></p>
          <div class="ytlbl"><i class="fa-brands fa-youtube"></i> Gameplay Walkthrough</div>
          <div class="ytwrap"><iframe id="ytf" allowfullscreen></iframe></div>
        </div>
      </div>
      <div class="simcol">
        <div class="simt">Similar Games</div>
        <div class="siml" id="siml"></div>
      </div>
    </div>
  </div>

  <!-- SEARCH PAGE -->
  <div id="srp" class="page">
    <div class="pgt" id="srh"></div>
    <p class="pgs" id="srs"></p>
    <div class="rgrid" id="srg"></div>
  </div>

  <!-- CATEGORY PAGE -->
  <div id="cp" class="page">
    <div class="pgt" id="cph"></div>
    <p class="pgs" id="cps"></p>
    <div class="cgrid" id="cpg"></div>
  </div>

</main>

<!-- CONTROLS MODAL -->
<div class="ov" id="cm" onclick="if(event.target===this)closeCM()">
  <div class="mb">
    <div class="mhd"><h3>Game Controls</h3><button class="mcl" onclick="closeCM()"><i class="fa-solid fa-xmark"></i></button></div>
    <div id="cmb"></div>
  </div>
</div>

<!-- FAVORITES MODAL -->
<div class="ov" id="fm" onclick="if(event.target===this)closeFM()">
  <div class="mb wide">
    <div class="mhd"><h3>Your Favorites</h3><button class="mcl" onclick="closeFM()"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="fgrid" id="fmg"></div>
  </div>
</div>

<!-- NOTIFS MODAL -->
<div class="ov" id="nm" onclick="if(event.target===this)closeNM()">
  <div class="mb">
    <div class="mhd"><h3>Notifications</h3><button class="mcl" onclick="closeNM()"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="nlist" id="nml"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><i class="fa-solid fa-circle-check"></i><span id="tmsg"></span></div>

<script>
// ════════════════════════════════════
//  CATEGORIES
// ════════════════════════════════════
const CATS=[

// ════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════
function buildSB(){
  document.getElementById("snav").innerHTML=CATS.map(c=>`
    <div class="si" onclick="showCat('${c.id}')">
      <div class="sic"><i class="fa-solid ${c.icon}"></i></div>
      <span class="sil">${c.label}</span>
    </div>`).join("");
}
function toggleSB(){
  document.body.classList.toggle("sbo");
  document.getElementById("sb-icon").className=
    document.body.classList.contains("sbo")?"fa-solid fa-xmark":"fa-solid fa-bars";
}

// ════════════════════════════════════
//  HOME
// ════════════════════════════════════
function buildHome(){
  const tp=G.filter(g=>g.cats.includes("top-picks"));
  let h=`
    <div class="pgt">Welcome to Zonely</div>
    <p class="pgs">Thousands of free browser games — no download required</p>
    <div class="sec">
      <div class="sechd">
        <span class="sect">Top Picks For You</span>
        <button class="va" onclick="showCat('top-picks')">View All <i class="fa-solid fa-chevron-right" style="font-size:10px"></i></button>
      </div>
      <div class="hgrid">${tp.slice(0,7).map(g=>card(g)).join("")}</div>
    </div>`;
  [
    {id:"featured",lb:"Featured Games"},{id:"io",lb:"IO & Multiplayer"},
    {id:"2player",lb:"2 Player Games"},{id:"cant-stop",lb:"Can't Stop Playing"},
    {id:"friends",lb:"Play with Friends"},{id:"new",lb:"New Games"},
    {id:"action",lb:"Action & Shooters"},{id:"driving",lb:"Driving Games"},
    {id:"shooting",lb:"Shooting Games"},{id:"puzzle",lb:"Puzzle Games"},
    {id:"adventure",lb:"Adventure Games"},{id:"strategy",lb:"Strategy & Management"},
    {id:"clicker",lb:"Clicker Games"},{id:"sports",lb:"Sports Games"},
  ].forEach(s=>{
    const gs=G.filter(g=>g.cats.includes(s.id));
    if(!gs.length)return;
    const rid="r_"+s.id;
    h+=`
      <div class="sec">
        <div class="sechd">
          <span class="sect">${s.lb}</span>
          <button class="va" onclick="showCat('${s.id}')">View All <i class="fa-solid fa-chevron-right" style="font-size:10px"></i></button>
        </div>
        <div class="rw">
          <button class="arr l" onclick="scrollR('${rid}',-480)"><i class="fa-solid fa-chevron-left"></i></button>
          <div class="sr" id="${rid}">${gs.map(g=>card(g)).join("")}</div>
          <button class="arr r" onclick="scrollR('${rid}',480)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>`;
  });
  document.getElementById("hp").innerHTML=h;
}

function card(g){
  return`<div class="gc" onclick="playGame(${g.id})">
    ${g.cats.includes("new")?'<span class="gbadge">New</span>':""}
    <div class="gt"><img src="${g.th}" alt="${g.t}" loading="lazy"
      onerror="this.style.opacity=0"></div>
    <div class="gcn">${g.t}</div>
    <div class="gcm">${g.dev} &middot; ${g.yr}</div>
  </div>`;
}

function scrollR(id,a){
  const el=document.getElementById(id);
  if(el)el.scrollBy({left:a,behavior:"smooth"});
}

// ════════════════════════════════════
//  PLAY GAME
// ════════════════════════════════════
function playGame(id){
  cur=G.find(g=>g.id===id);
  if(!cur)return;
  showPg("gp");
  document.getElementById("gio").innerHTML=
    `<iframe src="${cur.url}" allow="fullscreen;gamepad;pointer-lock" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock allow-downloads"></iframe>`;
  document.getElementById("gt").textContent=cur.t;
  document.getElementById("gd").textContent=cur.desc;
  document.getElementById("fsgt").textContent=cur.t;
  document.getElementById("gm").innerHTML=`
    <span class="gmi"><i class="fa-solid fa-user"></i>${cur.dev}</span>
    <span class="gmi"><i class="fa-solid fa-calendar"></i>${cur.yr}</span>
    <span class="gmi"><i class="fa-solid fa-microchip"></i>${cur.tech}</span>
    <span class="gmi"><i class="fa-solid fa-globe"></i>Browser Playable</span>`;
  document.getElementById("ytf").src=`https://www.youtube.com/embed/${cur.yt}?rel=0`;
  const sim=G.filter(g=>g.id!==cur.id&&g.cats.some(c=>cur.cats.includes(c))).slice(0,14);
  document.getElementById("siml").innerHTML=sim.map(g=>`
    <div class="simcard" onclick="playGame(${g.id})">
      <img class="simthumb" src="${g.th}" alt="${g.t}" onerror="this.style.display='none'">
      <div class="siminfo">
        <div class="simname">${g.t}</div>
        <div class="simmeta">${g.dev} &middot; ${g.yr}</div>
      </div>
    </div>`).join("");
  window.scrollTo({top:0,behavior:"smooth"});
}

// ════════════════════════════════════
//  FULLSCREEN
// ════════════════════════════════════
function goFS(){
  const el=document.getElementById("gio");
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen;
  if(req) req.call(el).catch(()=>toast("Fullscreen unavailable for this game"));
}
function exitFS(){
  const ex=document.exitFullscreen||document.webkitExitFullscreen;
  if(ex) ex.call(document);
}
function onFSC(){
  const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const bar=document.getElementById("fsbar");
  const btn=document.getElementById("fsbtn");
  barHidden=false;
  if(inFS){
    bar.classList.add("on");
    btn.innerHTML='<i class="fa-solid fa-compress"></i> Exit Fullscreen';
    btn.onclick=exitFS;
  }else{
    bar.classList.remove("on");
    btn.innerHTML='<i class="fa-solid fa-expand"></i> Fullscreen';
    btn.onclick=goFS;
  }
}
function hideBar(){
  barHidden=true;
  document.getElementById("fsbar").classList.remove("on");
  toast("Bar hidden — exit fullscreen to restore it");
}

// ════════════════════════════════════
//  CATEGORY
// ════════════════════════════════════
function showCat(id){
  const cat=CATS.find(c=>c.id===id);
  const gs=G.filter(g=>g.cats.includes(id)||g.tags.some(t=>t===id));
  showPg("cp");
  document.getElementById("cph").textContent=cat?cat.label:id;
  document.getElementById("cps").textContent=`${gs.length} game${gs.length!==1?"s":""} available`;
  document.getElementById("cpg").innerHTML=gs.map(g=>card(g)).join("");
  document.querySelectorAll(".si").forEach(el=>{
    el.classList.toggle("active",el.onclick&&el.onclick.toString().includes(`'${id}'`));
  });
  window.scrollTo({top:0});
}

// ════════════════════════════════════
//  SEARCH
// ════════════════════════════════════
const TM={
  "gun":["gun","shooting","fps","shooter"],"soccer":["sports","football","soccer"],
  "click":["clicker","idle","casual"],"race":["racing","driving","car"],
  "car":["driving","racing","car"],"build":["building","sandbox","strategy"],
  "fight":["action","fighting","battle"],"sniper":["sniper","shooting","fps"],
  "run":["running","endless","adventure"],"zombie":["zombie","survival","shooting"],
  "tank":["tank","shooter","io"],"snake":["snake","io","casual"],
  "word":["word","puzzle","letter"],"craft":["minecraft","building","sandbox"],
  "kart":["kart","racing","driving"],"drift":["drift","racing","car"],
  "ball":["sports","basketball","football"],"board":["chess","puzzle","classic"],
};
function doSearch(){
  const q=document.getElementById("si").value.toLowerCase().trim();
  if(!q){goHome();return;}
  const ex=Object.entries(TM).filter(([k])=>q.includes(k)).flatMap(([,v])=>v);
  const terms=[...new Set([q,...ex])];
  const res=G.filter(g=>terms.some(t=>
    g.t.toLowerCase().includes(t)||
    g.tags.some(x=>x.includes(t))||
    g.desc.toLowerCase().includes(t)||
    g.cats.some(x=>x.includes(t))
  ));
  showPg("srp");
  document.getElementById("srh").textContent=`Results for "${q}"`;
  document.getElementById("srs").textContent=`${res.length} game${res.length!==1?"s":""} found`;
  document.getElementById("srg").innerHTML=res.length
    ?res.map(g=>card(g)).join("")
    :`<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 20px">No results for "${q}" — try another keyword.</div>`;
  window.scrollTo({top:0});
}

// ════════════════════════════════════
//  PAGE ROUTER
// ════════════════════════════════════
function showPg(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("on");
  });
  if(id!=="gp"){
    document.getElementById("gio").innerHTML="";
    document.getElementById("ytf").src="";
  }
  document.getElementById(id).classList.add("on");
}
function goHome(){
  showPg("hp");
  document.getElementById("si").value="";
  document.querySelectorAll(".si").forEach(el=>el.classList.remove("active"));
  window.scrollTo({top:0});
}

// ════════════════════════════════════
//  GAME ACTIONS
// ════════════════════════════════════
function likeGame(){
  if(!cur)return;
  if(!favs.includes(cur.id)){
    favs.push(cur.id);
    try{localStorage.setItem("zn_f",JSON.stringify(favs))}catch(e){}
    updateFC();toast("Added to favorites");
  }else toast("Already in your favorites");
}
function openControls(){
  if(!cur)return;
  document.getElementById("cmb").innerHTML=
    `<table class="ctbl">${cur.ctrl.map(([a,k])=>`
      <tr>
        <td>${a}</td>
        <td>${k.split(" / ").map(x=>`<span class="kbd">${x}</span>`).join(" ")}</td>
      </tr>`).join("")}</table>`;
  document.getElementById("cm").classList.add("on");
}
function closeCM(){document.getElementById("cm").classList.remove("on")}
function shareGame(){
  if(!cur)return;
  const u=`https://zonely.com/game/${cur.id}`;
  if(navigator.clipboard)navigator.clipboard.writeText(u).then(()=>toast("Link copied")).catch(()=>toast("Share: "+u));
  else toast("Share: "+u);
}
function updateFC(){document.getElementById("fc").textContent=favs.length}

// ════════════════════════════════════
//  FAVORITES
// ════════════════════════════════════
function openFavs(){
  const fgs=favs.map(id=>G.find(g=>g.id===id)).filter(Boolean);
  document.getElementById("fmg").innerHTML=fgs.length
    ?fgs.map(g=>`
        <div class="fitem" onclick="playGame(${g.id});closeFM()">
          <img src="${g.th}" alt="${g.t}" onerror="this.style.display='none'">
          <div class="filab">${g.t}</div>
        </div>`).join("")
    :`<div class="empty" style="grid-column:1/-1"><i class="fa-regular fa-heart"></i>No favorites yet. Like a game to save it here.</div>`;
  document.getElementById("fm").classList.add("on");
}
function closeFM(){document.getElementById("fm").classList.remove("on")}

  {icon:"fa-fire",text:"Bloxd.io received a major update with new game modes!",time:"2 hours ago"},

];

    <div class="ni">

      <div><div class="nt">${n.text}</div><div class="ntm">${n.time}</div></div>
    </div>`).join("");

// ════════════════════════════════════
//  USER
// ════════════════════════════════════
function toggleUser(){
  loggedIn=!loggedIn;
  document.getElementById("uico").style.color=loggedIn?"#fff":"var(--pl)";
  toast(loggedIn?"Signed in as Guest":"Signed out");
}

// ════════════════════════════════════
//  TOAST
// ════════════════════════════════════
let tt;
function toast(msg){
  const el=document.getElementById("toast");
  document.getElementById("tmsg").textContent=msg;
  el.classList.add("on");
  clearTimeout(tt);
  tt=setTimeout(()=>el.classList.remove("on"),2800);
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){closeCM();closeFM();closeNM();}
});

window.addEventListener("DOMContentLoaded",init);
</script>
