const CSS=`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--b0:#08080d;--b1:#0e0e16;--b2:#161622;--b3:#111119;--bh:#1c1c2e;--p:#7c3aed;--pl:#a78bfa;--pd:#5b21b6;--pg:rgba(124,58,237,.25);--ps:rgba(124,58,237,.08);--t1:#eaeaf2;--t2:#8888a4;--t3:#505068;--bd:rgba(255,255,255,.05);--sc:72px;--se:240px;--hh:56px}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--b0);color:var(--t1);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.Z{display:flex;height:100vh;height:100dvh;overflow:hidden}
.M{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.C{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}

/* Mobile menu */
.mob-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:998;backdrop-filter:blur(4px)}
.mob-sb{position:fixed;left:0;top:0;bottom:0;width:280px;background:var(--b1);z-index:999;overflow-y:auto;animation:slR .25s ease;border-right:1px solid var(--bd);padding-bottom:env(safe-area-inset-bottom)}
@keyframes slR{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* Sidebar desktop */
.S{width:var(--sc);background:var(--b1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;z-index:50}
.S:hover{width:var(--se)}
.St{height:var(--hh);display:flex;align-items:center;padding:0 0 0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid var(--bd);cursor:pointer;overflow:hidden}
.Sl{width:38px;height:38px;min-width:38px;background:linear-gradient(135deg,var(--p),#9333ea);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px var(--pg)}
.Sn{font-size:20px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;opacity:0;transition:opacity .25s}
.S:hover .Sn{opacity:1}.Sn span{color:var(--pl)}

            <div className="dd-i"><I n="sparkle" s={14} c="#a78bfa"/><span>New games added this week!</span></div>
            <div className="dd-i"><I n="trophy" s={14} c="#eab308"/><span>Krunker.io is trending</span></div>
            <div className="dd-i"><I n="flame" s={14} c="#ef4444"/><span>Shell Shockers: new update</span></div>
          </div>}
          <button className="Hp" onClick={()=>{if(!user)sLogin(true);else{sProf(!showProf);sNotif(false)}}} title="Profile">
            {user?user.initial:<I n="user" s={16} c="white"/>}
          </button>
          {showProf&&user&&<div className="dd" style={{right:0,minWidth:240}}>
            <div className="dd-h" style={{gap:10}}><div className="g-avatar">{user.initial}</div><div><div style={{fontWeight:600,fontSize:13}}>{user.name}</div><div style={{fontSize:11,color:"var(--t3)"}}>{user.email}</div></div></div>
            <div className="dd-i" onClick={()=>sProf(false)}><I n="settings" s={14}/> Settings</div>
            <div className="dd-i" onClick={()=>{sSf(true);sProf(false)}}><I n="heart" s={14}/> Favorites ({fav.length})</div>
            <div className="dd-i" style={{color:"#ef4444"}} onClick={signOut}><I n="logout" s={14} c="#ef4444"/> Sign Out</div>
          </div>}
        </div>
      </header>

      <div className="C" ref={cRef}>
        {pg==="home"&&!isGrid&&cat==="all"&&(
          <>{homeRows.map(r=><Row key={r.id} title={r.l} games={getG(r.id)} onSelect={open} count={DB.filter(g=>g.cat.includes(r.id)).length}/>)}</>
        )}
        {pg==="home"&&isGrid&&(
          <div className="sr-pg">
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><I n={CATS.find(c=>c.id===cat)?.icon||"star"} s={22} c="#a78bfa"/><h2>{gridLabel} Games</h2><span className="gc">{gridGames.length}</span></div>
            <p>{gridGames.length} games available</p>
            <div className="grid">{gridGames.slice(0,120).map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
          </div>
        )}
        {pg==="search"&&srPage&&(
          <div className="sr-pg">
            <button className="bk" onClick={()=>{sSrPage(false);sP("home");sC("all")}}><I n="arrowLeft" s={16}/> Back</button>
            <h2>Results for "{srQ}"</h2><p>{res.length} games found</p>
            {res.length>0?<div className="grid">{res.map(g=><Card key={g.id} g={g} onClick={()=>open(g)}/>)}</div>
            :<div style={{textAlign:"center",padding:48,color:"var(--t3)"}}>No games found.</div>}
          </div>
        )}
        {pg==="game"&&gm&&(
          <div className="gp">
            <button className="bk" onClick={()=>{if(srPage)sP("search");else home()}}><I n="arrowLeft" s={16}/> Back</button>
            <div className="gp-t">
              <div className="gp-ad"><div className="ad-p">AD</div></div>
              <div className="gp-c">
                <div className={`gp-if ${fs?"fs":""}`}>
                  <iframe src={gm.url} title={gm.title} allow="autoplay; fullscreen; gamepad" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"/>
                  {fs&&<button style={{position:"absolute",top:10,right:10,zIndex:10000}} className="gb" onClick={()=>sFs(false)}><I n="shrink" s={14}/> Exit</button>}
                </div>
                <div className="gp-ac">
                  <button className={`gb ${lk[gm.id]?"on":""}`} onClick={()=>tL(gm.id)}><I n={lk[gm.id]?"heartFilled":"thumbsUp"} s={14} c={lk[gm.id]?"#7c3aed":undefined}/>{lk[gm.id]?"Liked":"Like"}</button>
                  <button className="gb" onClick={()=>sSc(true)}><I n="gamepad" s={14}/> Controls</button>
                  <button className={`gb ${isF(gm.id)?"on":""}`} onClick={()=>tF(gm)}><I n={isF(gm.id)?"heartFilled":"heart"} s={14} c={isF(gm.id)?"#7c3aed":undefined}/>{isF(gm.id)?"Saved":"Save"}</button>
                  <button className="gb" onClick={()=>{if(navigator.share)navigator.share({title:gm.title,url:window.location.href})}}><I n="share" s={14}/> Share</button>
                  <button className="gb" onClick={()=>sFs(true)}><I n="maximize" s={14}/> Fullscreen</button>
                </div>
                <div className="gd"><h2>{gm.title}</h2><p>{gm.desc}</p>
                  <div className="gm">
                    <div className="gmi"><div className="gml">Developer</div><div className="gmv">{gm.dev}</div></div>
                    <div className="gmi"><div className="gml">Released</div><div className="gmv">{gm.yr}</div></div>
                    <div className="gmi"><div className="gml">Technology</div><div className="gmv">{gm.tech}</div></div>
                    <div className="gmi"><div className="gml">Category</div><div className="gmv">{gm.cat.slice(0,3).join(", ")}</div></div>
                  </div>
                </div>
              </div>
              <div className="gs"><div className="smt">More Like This</div>{sim.map(g=>(
                <div key={g.id} className="smi" onClick={()=>open(g)}>
                  <img className="smth" src={g.thumb} alt="" onError={e=>{e.target.style.background="var(--b2)"}}/>
                  <div className="smif"><div className="smn">{g.title}</div><div className="smc">{g.cat[0]}</div></div>
                </div>
              ))}</div>
            </div>
          </div>
        )}
      </div>
    </div>

    {sf&&<div className="fp">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><h3 style={{fontSize:16,fontWeight:700}}>My Favorites</h3><button className="xb" onClick={()=>sSf(false)}><I n="x" s={18}/></button></div>
      {fav.length===0?<div style={{textAlign:"center",padding:"40px 16px",color:"var(--t3)"}}><I n="heart" s={36} c="#505068"/><p style={{marginTop:10,fontSize:13}}>No favorites yet</p></div>
      :fav.map(g=><div key={g.id} className="smi" onClick={()=>{open(g);sSf(false)}}><img className="smth" src={g.thumb} alt="" onError={e=>{e.target.style.background="var(--b2)"}}/><div className="smif"><div className="smn">{g.title}</div><div className="smc">{g.cat[0]}</div></div></div>)}
    </div>}

    {sc&&gm&&<div className="ov" onClick={()=>sSc(false)}><div className="pp" onClick={e=>e.stopPropagation()}>
      <div className="pp-h"><h3>Controls</h3><button className="xb" onClick={()=>sSc(false)}><I n="x" s={18}/></button></div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><I n="gamepad" s={22} c="#7c3aed"/><span style={{fontSize:15,fontWeight:600}}>{gm.title}</span></div>
      <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.8}}>{gm.ctrl}</p>
    </div></div>}

    {showLogin&&<div className="ov" onClick={()=>sLogin(false)}><div className="pp" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
      <div className="pp-h"><h3>Sign in to Zonely</h3><button className="xb" onClick={()=>sLogin(false)}><I n="x" s={18}/></button></div>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:6}}>Save favorites, track progress, and more.</p>
      <button className="g-btn" onClick={signIn}><I n="google" s={18}/> Continue with Google</button>
      <p style={{fontSize:11,color:"var(--t3)",marginTop:10}}>By signing in you agree to our Terms</p>
    </div></div>}
  </div></>);
}
        // --- PASTE YOUR GOOGLE DOC CODE ABOVE THIS LINE ---

        // 5. THE RENDER COMMAND (Crucial for showing the screen)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Zonely />);
    </script>
</body>
</html>
