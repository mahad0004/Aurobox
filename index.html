<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zonely - Free Online Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #080810;
      --bg2: #0e0e1a;
      --bg3: #13131f;
      --bg4: #1a1a2e;
      --border: #1e1e30;
      --purple: #7c3aed;
      --purple-light: #9b5cf6;
      --purple-dim: rgba(124,58,237,0.15);
      --purple-glow: rgba(124,58,237,0.3);
      --text: #f0f0f8;
      --text-muted: #7070a0;
      --text-dim: #4a4a70;
      --radius: 14px;
      --radius-lg: 20px;
      --sidebar-w: 240px;
      --sidebar-collapsed: 66px;
      --header-h: 62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: rgba(8,8,16,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px 0 calc(var(--sidebar-collapsed) + 16px);
      z-index: 100;
      transition: padding-left 0.3s ease;
    }
    body.sidebar-open #header { padding-left: calc(var(--sidebar-w) + 16px); }

    .logo-area {
      display: flex; align-items: center; gap: 10px;
      position: absolute; left: 0; top: 0; height: var(--header-h);
      padding: 0 14px;
      text-decoration: none; color: var(--text);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--purple);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 18px; color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--purple-glow);
    }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 18px;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .search-wrap {
      flex: 1; max-width: 540px;
      display: flex; align-items: center; gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px; height: 40px;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--purple); }
    .search-wrap i { color: var(--text-muted); font-size: 13px; }
    .search-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 14px;
    }
    .search-wrap input::placeholder { color: var(--text-dim); }

    .header-actions {
      display: flex; align-items: center; gap: 6px; margin-left: auto;
    }
    .hbtn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer; font-size: 15px;
      transition: all 0.2s; position: relative;
    }
    .hbtn:hover { color: var(--text); border-color: var(--purple); background: var(--purple-dim); }
    .notif-badge {
      position: absolute; top: 5px; right: 5px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #ef4444; border: 1.5px solid var(--bg);
    }
    .fav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px; min-width: 60px;
      font-size: 13px; font-weight: 600;
    }
    .user-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px; min-width: auto; width: auto;
      font-size: 13px; font-weight: 500;
    }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--purple); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════ */
    #sidebar {
      position: fixed; left: 0; top: var(--header-h);
      width: var(--sidebar-collapsed);
      height: calc(100vh - var(--header-h));
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; z-index: 90;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #sidebar:hover, body.sidebar-open #sidebar { width: var(--sidebar-w); }

    .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 8px; }
    .sidebar-nav::-webkit-scrollbar { width: 0; }

    .snav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; white-space: nowrap;
      color: var(--text-muted);
      transition: all 0.2s; margin-bottom: 2px;
    }
    .snav-item:hover { color: var(--text); background: var(--bg3); }
    .snav-item.active { color: var(--purple-light); background: var(--purple-dim); }
    .snav-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 15px;
      background: var(--bg3);
      transition: background 0.2s;
    }
    .snav-item:hover .snav-icon { background: var(--bg4); }
    .snav-item.active .snav-icon { background: var(--purple-dim); color: var(--purple-light); }
    .snav-label { font-size: 13.5px; font-weight: 500; opacity: 0; transition: opacity 0.2s 0.05s; }
    #sidebar:hover .snav-label, body.sidebar-open #sidebar .snav-label { opacity: 1; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 12px; }

    /* ══════════════════════════════════════════
       MAIN CONTENT
    ══════════════════════════════════════════ */
    #main {
      margin-left: var(--sidebar-collapsed);
      margin-top: var(--header-h);
      transition: margin-left 0.3s ease;
      min-height: calc(100vh - var(--header-h));
    }
    body.sidebar-open #main { margin-left: var(--sidebar-w); }

    /* ══════════════════════════════════════════
       HOME PAGE
    ══════════════════════════════════════════ */
    #home-page { padding: 32px 28px; }

    .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
    .page-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; }

    /* Hero collage — top picks */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: auto auto;
      gap: 12px;
      margin-bottom: 48px;
    }
    .hero-grid .game-card:first-child { grid-column: span 2; grid-row: span 2; }
    .hero-grid .game-card:nth-child(2) { grid-column: span 2; }

    .section-block { margin-bottom: 48px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px;
    }
    .view-all-btn {
      display: flex; align-items: center; gap: 5px;
      color: var(--purple-light); font-size: 13px; font-weight: 500;
      cursor: pointer; background: none; border: none;
      transition: opacity 0.2s;
    }
    .view-all-btn:hover { opacity: 0.7; }

    /* Scrollable row */
    .row-wrap { position: relative; }
    .scroll-row {
      display: flex; gap: 12px;
      overflow-x: auto; scroll-behavior: smooth;
      scrollbar-width: none; padding-bottom: 8px;
    }
    .scroll-row::-webkit-scrollbar { display: none; }

    .row-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: all 0.2s; z-index: 5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .row-wrap:hover .row-arrow { opacity: 1; pointer-events: all; }
    .row-arrow:hover { background: var(--purple); border-color: var(--purple); }
    .row-arrow.left { left: -14px; }
    .row-arrow.right { right: -14px; }

    /* ══════════════════════════════════════════
       GAME CARD
    ══════════════════════════════════════════ */
    .game-card {
      flex-shrink: 0;
      width: 200px;
      cursor: pointer;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: var(--bg3);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s;
    }
    .game-card:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(124,58,237,0.25); }
    .hero-grid .game-card { width: auto; }
    .game-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
    .game-thumb-wrap img,
    .game-thumb-wrap video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .game-thumb-wrap video {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.3s;
    }
    .game-card:hover .game-thumb-wrap video { opacity: 1; }
    .game-card-label {
      padding: 9px 11px 10px;
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .game-card-meta {
      padding: 0 11px 10px;
      font-size: 11px; color: var(--text-muted);
    }
    .game-badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--purple); color: #fff;
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 6px; letter-spacing: 0.3px;
    }

    /* ══════════════════════════════════════════
       GAME PAGE
    ══════════════════════════════════════════ */
    #game-page { display: none; padding: 24px 28px; }

    .game-page-grid {
      display: grid;
      grid-template-columns: 160px 1fr 260px;
      gap: 24px;
      align-items: start;
    }

    /* Left ad col */
    .ad-col { display: flex; flex-direction: column; gap: 16px; position: sticky; top: calc(var(--header-h) + 24px); }
    .ad-slot {
      background: var(--bg3); border: 1px dashed var(--border);
      border-radius: var(--radius); display: flex; align-items: center;
      justify-content: center; text-align: center;
      color: var(--text-dim); font-size: 10px; line-height: 1.6;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .ad-slot.tall { height: 280px; }
    .ad-slot.medium { height: 220px; }

    /* Center col */
    .game-center { min-width: 0; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--purple-light); font-size: 13.5px; font-weight: 500;
      cursor: pointer; background: none; border: none;
      margin-bottom: 16px; transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.7; }

    .game-iframe-wrap {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius-lg); overflow: hidden;
      background: #000;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    .game-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .game-actions {
      display: flex; align-items: center; gap: 10px;
      margin-top: 16px;
    }
    .g-action-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px; border-radius: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .g-action-btn:hover { border-color: var(--purple); background: var(--purple-dim); color: var(--purple-light); }
    .g-action-btn.primary { background: var(--purple); border-color: var(--purple); color: #fff; }
    .g-action-btn.primary:hover { background: #6d28d9; }
    .g-action-btn i { font-size: 13px; }

    .game-info { margin-top: 32px; }
    .game-info-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
    .game-meta-row {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .game-meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
    .game-meta-item i { color: var(--purple-light); font-size: 12px; }
    .game-desc { font-size: 14.5px; line-height: 1.75; color: #c0c0d8; margin-bottom: 32px; }

    .yt-section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .yt-section-title i { color: #ef4444; }
    .yt-embed { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden; }
    .yt-embed iframe { width: 100%; height: 100%; border: none; }

    /* Right col - similar games */
    .similar-col { position: sticky; top: calc(var(--header-h) + 24px); }
    .similar-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
    .similar-list { display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - var(--header-h) - 60px); overflow-y: auto; scrollbar-width: none; }
    .similar-list::-webkit-scrollbar { display: none; }

    .sim-card {
      display: flex; gap: 10px; cursor: pointer;
      padding: 8px; border-radius: 10px;
      background: var(--bg3); border: 1px solid transparent;
      transition: all 0.2s;
    }
    .sim-card:hover { border-color: var(--border); background: var(--bg4); }
    .sim-thumb { width: 80px; height: 50px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .sim-info { flex: 1; min-width: 0; }
    .sim-name { font-size: 12.5px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
    .sim-meta { font-size: 11px; color: var(--text-muted); }

    /* ══════════════════════════════════════════
       SEARCH PAGE
    ══════════════════════════════════════════ */
    #search-page { display: none; padding: 32px 28px; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 14px;
    }
    .results-grid .game-card { width: auto; }

    /* ══════════════════════════════════════════
       CATEGORY PAGE
    ══════════════════════════════════════════ */
    #cat-page { display: none; padding: 32px 28px; }

    /* ══════════════════════════════════════════
       MODALS
    ══════════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      width: 90%; max-width: 440px;
      animation: modalPop 0.25s cubic-bezier(0.4,0,0.2,1);
      max-height: 85vh; overflow-y: auto;
    }
    .modal-box.wide { max-width: 720px; }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .modal-head h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text-muted); display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--purple); }

    .ctrl-table { width: 100%; border-collapse: collapse; }
    .ctrl-table td { padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
    .ctrl-table td:first-child { color: var(--text-muted); width: 40%; }
    .kbd {
      display: inline-flex; align-items: center;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 7px; font-size: 12px;
      font-family: 'Space Grotesk', sans-serif; color: var(--purple-light);
      margin: 1px;
    }

    .fav-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .fav-item { cursor: pointer; border-radius: 10px; overflow: hidden; background: var(--bg3); border: 1px solid transparent; transition: all 0.2s; }
    .fav-item:hover { border-color: var(--purple); }
    .fav-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .fav-item-label { padding: 7px 9px; font-size: 12px; font-weight: 500; }
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 14px; }
    .empty-state i { font-size: 30px; margin-bottom: 12px; display: block; color: var(--text-dim); }

    .notif-list { display: flex; flex-direction: column; gap: 14px; }
    .notif-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px; background: var(--bg3); border-radius: 10px; }
    .notif-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--purple-dim); display: flex; align-items: center; justify-content: center; color: var(--purple-light); flex-shrink: 0; }
    .notif-text { font-size: 13px; line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* Page fade animation */
    .page-enter { animation: pageIn 0.3s cubic-bezier(0.4,0,0.2,1); }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 9999; display: flex; align-items: center; gap: 9px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast i { color: var(--purple-light); }

    @media (max-width: 1200px) {
      .game-page-grid { grid-template-columns: 0 1fr 220px; }
      .ad-col { display: none; }
    }
    @media (max-width: 900px) {
      .game-page-grid { grid-template-columns: 1fr; }
      .similar-col { position: static; }
      .similar-list { max-height: none; flex-direction: row; flex-wrap: wrap; }
      .sim-card { width: calc(50% - 5px); flex-shrink: 0; }
    }
    @media (max-width: 640px) {
      #home-page, #game-page, #search-page, #cat-page { padding: 20px 14px; }
      .hero-grid { grid-template-columns: repeat(2,1fr); }
      .hero-grid .game-card:first-child { grid-column: span 2; grid-row: span 1; }
      .hero-grid .game-card:nth-child(2) { grid-column: span 1; }
    }
  </style>
</head>
<body>

<!-- ══════ HEADER ══════ -->
<header id="header">
  <a href="#" class="logo-area" onclick="goHome();return false;">
    <div class="logo-icon">Z</div>
    <span class="logo-text">Zonely</span>
  </a>

  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="search-input" type="text" placeholder="Search games — try 'gun', 'soccer', 'racing'..."
           onkeyup="if(event.key==='Enter')handleSearch()">
  </div>

  <div class="header-actions">
    <button class="hbtn" onclick="openNotifs()" title="Notifications">
      <i class="fa-solid fa-bell"></i>
      <span class="notif-badge"></span>
    </button>
    <button class="hbtn fav-btn" onclick="openFavs()" title="Favorites">
      <i class="fa-solid fa-heart"></i>
      <span id="fav-count">0</span>
    </button>
    <button class="hbtn user-btn" onclick="toggleUser()">
      <div class="user-avatar" id="user-avatar">G</div>
      <span id="user-label">Sign in</span>
    </button>
  </div>
</header>

<!-- ══════ SIDEBAR ══════ -->
<nav id="sidebar">
  <div class="sidebar-nav" id="sidebar-nav"></div>
</nav>

<!-- ══════ MAIN ══════ -->
<main id="main">

  <!-- HOME -->
  <div id="home-page"></div>

  <!-- GAME -->
  <div id="game-page">
    <div class="game-page-grid">
      <!-- Left ads -->
      <div class="ad-col">
        <div class="ad-slot tall">AD<br>160×600</div>
        <div class="ad-slot medium">AD<br>160×400</div>
      </div>
      <!-- Center -->
      <div class="game-center">

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let favorites = JSON.parse(localStorage.getItem("zn_favs") || "[]");
let currentGame = null;
let userLoggedIn = false;

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  renderSidebar();
  renderHome();
  updateFavCount();
}

// ═══════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById("sidebar-nav");
  nav.innerHTML = CATS.map(c => `
    <div class="snav-item" onclick="showCategory('${c.id}')">
      <div class="snav-icon"><i class="fa-solid ${c.icon}"></i></div>
      <span class="snav-label">${c.label}</span>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════
//  HOME PAGE
// ═══════════════════════════════════════════
function renderHome() {
  const pg = document.getElementById("home-page");
  const topPicks = GAMES.filter(g => g.cats.includes("top-picks"));

  let html = `
    <div class="page-title">Welcome to Zonely</div>
    <p class="page-sub">Thousands of free browser games — no download required</p>

    <!-- Hero: Top Picks collage -->
    <div class="section-block">
      <div class="section-head">
        <span class="section-title">Top Picks For You</span>
        <button class="view-all-btn" onclick="showCategory('top-picks')">View All <i class="fa-solid fa-chevron-right" style="font-size:11px"></i></button>
      </div>
      <div class="hero-grid">
        ${topPicks.slice(0, 7).map((g, i) => gameCardHTML(g, i === 0 ? "large" : "")).join("")}
      </div>
    </div>
  `;

  // Sections
  const sections = [
    { id:"featured",   label:"Featured Games" },
    { id:"io",         label:"IO & Multiplayer" },
    { id:"2player",    label:"2 Player Games" },
    { id:"cant-stop",  label:"Can't Stop Playing" },
    { id:"friends",    label:"Play with Friends" },
    { id:"new",        label:"New Games" },
    { id:"action",     label:"Action & Shooters" },
    { id:"driving",    label:"Driving Games" },
    { id:"shooting",   label:"Shooting Games" },
    { id:"puzzle",     label:"Puzzle Games" },
    { id:"adventure",  label:"Adventure Games" },
    { id:"strategy",   label:"Strategy & Management" },
    { id:"clicker",    label:"Clicker Games" },
    { id:"sports",     label:"Sports Games" },
  ];

  sections.forEach(s => {
    const games = GAMES.filter(g => g.cats.includes(s.id));
    if (games.length < 2) return;
    const rowId = "row_" + s.id;
    html += `
      <div class="section-block">
        <div class="section-head">
          <span class="section-title">${s.label}</span>
          <button class="view-all-btn" onclick="showCategory('${s.id}')">View All <i class="fa-solid fa-chevron-right" style="font-size:11px"></i></button>
        </div>
        <div class="row-wrap">
          <button class="row-arrow left" onclick="scrollRow('${rowId}',-520)"><i class="fa-solid fa-chevron-left"></i></button>
          <div class="scroll-row" id="${rowId}">
            ${games.map(g => gameCardHTML(g)).join("")}
          </div>
          <button class="row-arrow right" onclick="scrollRow('${rowId}',520)"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    `;
  });

  pg.innerHTML = html;
}

function gameCardHTML(g, size="") {
  const isLarge = size === "large";
  return `
    <div class="game-card" onclick="playGame(${g.id})" style="${isLarge ? 'aspect-ratio:16/9' : ''}">
      ${g.cats.includes("new") ? '<span class="game-badge">NEW</span>' : ''}
      <div class="game-thumb-wrap">
        <img src="${g.thumb}" alt="${g.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180/13131f/7c3aed?text=${encodeURIComponent(g.title)}'">
        ${g.video ? `<video muted loop playsinline onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"><source src="${g.video}" type="video/mp4"></video>` : ""}
      </div>
      <div class="game-card-label">${g.title}</div>
      <div class="game-card-meta">${g.dev} &middot; ${g.year}</div>
    </div>
  `;
}

function scrollRow(id, amount) {
  const row = document.getElementById(id);
  if (row) row.scrollBy({ left: amount, behavior: "smooth" });
}

// ═══════════════════════════════════════════
//  GAME PAGE
// ═══════════════════════════════════════════
function playGame(id) {
  currentGame = GAMES.find(g => g.id === id);
  if (!currentGame) return;

  showPage("game-page");

  // Iframe
  document.getElementById("game-iframe-wrap").innerHTML =
    `<iframe src="${currentGame.url}" allow="fullscreen; gamepad; pointer-lock" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock"></iframe>`;

  // Meta
  document.getElementById("g-title").textContent = currentGame.title;
  document.getElementById("g-desc").textContent = currentGame.desc;

  const tech = currentGame.tech || "HTML5";
  document.getElementById("g-meta").innerHTML = `
    <span class="game-meta-item"><i class="fa-solid fa-user"></i>${currentGame.dev}</span>
    <span class="game-meta-item"><i class="fa-solid fa-calendar"></i>${currentGame.year}</span>
    <span class="game-meta-item"><i class="fa-solid fa-microchip"></i>${tech}</span>
    <span class="game-meta-item"><i class="fa-solid fa-globe"></i>Browser Playable</span>
  `;

  // YouTube
  document.getElementById("yt-iframe").src = `https://www.youtube.com/embed/${currentGame.yt}?rel=0`;

  // Similar
  const similar = GAMES.filter(g => g.id !== currentGame.id && g.cats.some(c => currentGame.cats.includes(c))).slice(0, 14);
  document.getElementById("similar-list").innerHTML = similar.map(g => `
    <div class="sim-card" onclick="playGame(${g.id})">
      <img class="sim-thumb" src="${g.thumb}" alt="${g.title}" onerror="this.src='https://via.placeholder.com/80x50/13131f/7c3aed?text=${encodeURIComponent(g.title)}'">
      <div class="sim-info">
        <div class="sim-name">${g.title}</div>
        <div class="sim-meta">${g.dev} &middot; ${g.year}</div>
      </div>
    </div>
  `).join("");

  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ═══════════════════════════════════════════
//  CATEGORY PAGE
// ═══════════════════════════════════════════
function showCategory(catId) {
  const cat = CATS.find(c => c.id === catId);
  const games = GAMES.filter(g => g.cats.includes(catId) || g.tags.includes(catId));
  showPage("cat-page");
  document.getElementById("cat-heading").textContent = cat ? cat.label : catId;
  document.getElementById("cat-sub").textContent = `${games.length} games available`;
  document.getElementById("cat-grid").innerHTML = games.map(g => gameCardHTML(g)).join("");

  // Mark active sidebar
  document.querySelectorAll(".snav-item").forEach(el => el.classList.remove("active"));
  const items = document.querySelectorAll(".snav-item");
  items.forEach(el => {
    if (el.onclick && el.onclick.toString().includes(catId)) el.classList.add("active");
  });
}

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
function handleSearch() {
  const q = document.getElementById("search-input").value.toLowerCase().trim();
  if (!q) { goHome(); return; }

  // Smart tag mapping
  const tagMap = {
    "gun": ["gun","shooting","fps","shooter"],
    "soccer": ["sports","football","soccer"],
    "click": ["clicker","idle","casual"],
    "race": ["racing","driving","car"],
    "car": ["driving","racing","car"],
    "build": ["building","sandbox","strategy"],
    "fight": ["action","fighting","battle"],
    "sniper": ["sniper","shooting","fps"],
    "puzzle": ["puzzle","brain"],
    "run": ["running","endless","adventure"],
    "zombie": ["zombie","survival","shooting"],
    "tank": ["tank","shooter","io"],
    "snake": ["snake","io","casual"],
    "word": ["word","puzzle","letter"],
  };

  const extraTags = Object.entries(tagMap).reduce((acc, [key, tags]) => {
    if (q.includes(key)) acc.push(...tags);
    return acc;
  }, []);
  const searchTerms = [q, ...extraTags];

  const results = GAMES.filter(g =>
    searchTerms.some(t =>
      g.title.toLowerCase().includes(t) ||
      g.tags.some(tag => tag.includes(t)) ||
      g.desc.toLowerCase().includes(t) ||
      g.cats.some(c => c.includes(t))
    )
  );

  showPage("search-page");
  document.getElementById("search-heading").textContent = `Results for "${q}"`;
  document.getElementById("search-sub").textContent = `${results.length} game${results.length !== 1 ? "s" : ""} found`;
  document.getElementById("search-grid").innerHTML = results.length
    ? results.map(g => gameCardHTML(g)).join("")
    : `<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:60px 20px;font-size:15px;">No games found for "${q}". Try a different keyword.</div>`;
}

// ═══════════════════════════════════════════
//  PAGE ROUTER
// ═══════════════════════════════════════════
function showPage(pageId) {
  ["home-page","game-page","search-page","cat-page"].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = "none";
    el.classList.remove("page-enter");
  });
  const target = document.getElementById(pageId);
  target.style.display = "block";
  void target.offsetWidth;
  target.classList.add("page-enter");
}

function goHome() {
  showPage("home-page");
  document.getElementById("search-input").value = "";
  document.querySelectorAll(".snav-item").forEach(el => el.classList.remove("active"));
  document.getElementById("game-iframe-wrap").innerHTML = "";
  window.scrollTo({ top: 0 });
}

// ═══════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════
function likeGame() {
  if (!currentGame) return;
  if (!favorites.includes(currentGame.id)) {
    favorites.push(currentGame.id);
    localStorage.setItem("zn_favs", JSON.stringify(favorites));
    updateFavCount();
    toast("Added to favorites");
  } else {
    toast("Already in favorites");
  }
}

function openControls() {
  if (!currentGame) return;
  const rows = currentGame.ctrl.map(([action, key]) => `
    <tr>
      <td>${action}</td>
      <td>${key.split(" / ").map(k => `<span class="kbd">${k}</span>`).join(" ")}</td>
    </tr>
  `).join("");
  document.getElementById("ctrl-body").innerHTML = `<table class="ctrl-table">${rows}</table>`;
  document.getElementById("ctrl-modal").classList.add("open");
}

function closeCtrl() { document.getElementById("ctrl-modal").classList.remove("open"); }

function shareGame() {
  if (!currentGame) return;
  const url = `https://zonely.com/game/${currentGame.id}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast("Link copied to clipboard"));
  } else {
    toast("Share: " + url);
  }
}

function toggleFullscreen() {
  const iframe = document.querySelector("#game-iframe-wrap iframe");
  if (!iframe) return;
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    iframe.requestFullscreen().catch(() => toast("Fullscreen not supported for this game"));
  }
}

function updateFavCount() {
  document.getElementById("fav-count").textContent = favorites.length;
}

// ═══════════════════════════════════════════
//  FAVORITES MODAL
// ═══════════════════════════════════════════
function openFavs() {
  const grid = document.getElementById("fav-grid");
  if (favorites.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fa-regular fa-heart"></i>No favorites yet. Like a game to add it here.</div>`;
  } else {
    grid.innerHTML = favorites.map(id => {
      const g = GAMES.find(x => x.id === id);
      if (!g) return "";
      return `
        <div class="fav-item" onclick="playGame(${g.id});closeFavs()">
          <img src="${g.thumb}" alt="${g.title}">
          <div class="fav-item-label">${g.title}</div>
        </div>`;
    }).join("");
  }
  document.getElementById("fav-modal").classList.add("open");
}
function closeFavs() { document.getElementById("fav-modal").classList.remove("open"); }

  document.getElementById("user-avatar").textContent = userLoggedIn ? "A" : "G";

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    closeCtrl(); closeFavs(); closeNotifs();
  }
});
