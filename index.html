<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zonely - Play Free Online Games</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root { --purple: #8b5cf6; }
    * { font-family: 'Inter', system_ui, sans-serif; }
    body { background: #0a0a0a; color: #f1f1f1; }
    
    .game-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .game-card:hover { transform: scale(1.04); box-shadow: 0 20px 25px -5px rgb(139 92 246 / 0.2); }
    .section-row::-webkit-scrollbar { display: none; }
    .sidebar { transition: width 0.3s ease; }
    
    .modal { animation: modalPop 0.3s ease forwards; }
    @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="min-h-screen">
  <div class="flex min-h-screen">
    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar w-16 hover:w-64 bg-[#111] border-r border-[#222] h-screen fixed left-0 top-0 flex flex-col z-50 overflow-hidden">
      <div class="px-4 py-6 flex items-center gap-3 border-b border-[#222]">
        <div class="w-8 h-8 bg-[#8b5cf6] rounded-2xl flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-gamepad text-white text-2xl"></i>
        </div>
        <span id="logo-text" class="text-2xl font-bold tracking-tighter text-white hidden">Zonely</span>
      </div>
      
      <div class="flex-1 overflow-y-auto py-4 px-3 space-y-2" id="sidebar-menu"></div>
      
      <div class="p-4 border-t border-[#222]">
        <div onclick="showGoogleSignIn()" class="flex items-center gap-3 cursor-pointer hover:bg-[#1f1f1f] rounded-2xl p-3">
          <div class="w-9 h-9 bg-[#222] rounded-2xl flex items-center justify-center">
            <i class="fa-solid fa-user text-[#8b5cf6]"></i>
          </div>
          <div id="sidebar-user-name" class="hidden text-sm font-semibold">Sign in</div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="flex-1 ml-16 transition-all">
      <!-- HEADER (always visible) -->
      <header class="bg-[#111] border-b border-[#222] h-16 flex items-center px-8 sticky top-0 z-40">
        <div class="flex-1 flex items-center gap-8">
          <button onclick="toggleSidebar()" class="lg:hidden text-2xl text-[#8b5cf6]">
            <i class="fa-solid fa-bars"></i>
          </button>
          
          <div class="flex-1 max-w-xl bg-[#1f1f1f] hover:bg-[#2a2a2a] rounded-3xl h-11 flex items-center px-5 gap-3 cursor-text border border-transparent hover:border-[#8b5cf6]/30">
            <i class="fa-solid fa-magnifying-glass text-[#8b5cf6]"></i>
            <input id="search-input" type="text" placeholder="Search games... (e.g. bloxd, krunker)" 
                   class="flex-1 bg-transparent outline-none text-sm placeholder:text-gray-400"
                   onkeyup="if(event.key==='Enter') performSearch()">
          </div>
        </div>
        
        <div class="flex items-center gap-6">
          <button onclick="showNotifications()" class="relative text-2xl hover:text-[#8b5cf6]">
            <i class="fa-solid fa-bell"></i>
            <span class="absolute -top-1 -right-1 text-[10px] bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center">3</span>
          </button>
          
          <button onclick="showFavorites()" class="flex items-center gap-2 text-xl hover:text-[#8b5cf6]">
            <i class="fa-solid fa-heart"></i>
            <span id="fav-count" class="text-sm font-medium">0</span>
          </button>
          
          <!-- Google Sign In Button in Header -->
          <button onclick="showGoogleSignIn()" 
                  id="header-login-btn"
                  class="flex items-center gap-2 px-5 py-2 bg-white text-black rounded-3xl text-sm font-semibold hover:bg-gray-100 transition-colors">
            <i class="fa-brands fa-google text-[#4285F4]"></i>
            <span>Sign in with Google</span>
          </button>
          
          <div onclick="showGoogleSignIn()" id="header-user" class="hidden items-center gap-3 cursor-pointer">
            <div id="user-avatar" class="w-8 h-8 bg-[#8b5cf6] text-white rounded-2xl flex items-center justify-center text-sm font-bold">A</div>
            <div id="header-username" class="text-sm font-semibold"></div>
          </div>
        </div>
      </header>

      <!-- Rest of your page (home + game page) is unchanged -->
      <div id="page-container" class="p-8">
        <div id="home-page"> ... (same as previous version) ... </div>
        <div id="game-page" class="hidden"> ... (same as previous version) ... </div>
      </div>
    </div>
  </div>

  <!-- GOOGLE SIGN-IN MODAL -->
  <div id="google-modal" onclick="if(event.target.id==='google-modal')hideGoogleModal()" 
       class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[10000]">
    <div onclick="event.stopImmediatePropagation()" 
         class="bg-[#111] rounded-3xl w-full max-w-md mx-4 p-8 text-center">
      <div class="mb-8">
        <div class="w-16 h-16 mx-auto bg-white rounded-2xl flex items-center justify-center text-4xl mb-4">
          <i class="fa-brands fa-google text-[#4285F4]"></i>
        </div>
        <h3 class="text-2xl font-semibold">Sign in to Zonely</h3>
        <p class="text-gray-400 mt-2">Continue with your Google account</p>
      </div>
      
      <button onclick="fakeGoogleLogin()" 
              class="w-full flex items-center justify-center gap-3 bg-white text-black hover:bg-gray-100 py-4 rounded-3xl text-lg font-medium transition-colors">
        <i class="fa-brands fa-google text-[#4285F4]"></i>
        Sign in with Google
      </button>
      
      <p class="text-xs text-gray-500 mt-8">By signing in you agree to our Terms and Privacy Policy</p>
      
      <button onclick="hideGoogleModal()" class="mt-6 text-gray-400 text-sm">Cancel</button>
    </div>
  </div>

  <!-- Other modals (controls, favorites, notifications) remain the same as last version -->

  <script>
    // ... (keep all the previous script exactly the same until initializeApp)

    let currentUser = null

    function showGoogleSignIn() {
      if (currentUser) {
        // already logged in → show logout option
        if (confirm("Log out?")) {
          currentUser = null
          updateLoginUI()
        }
        return
      }
      document.getElementById('google-modal').classList.remove('hidden')
      document.getElementById('google-modal').classList.add('flex')
    }

    function hideGoogleModal() {
      const modal = document.getElementById('google-modal')
      modal.classList.add('hidden')
      modal.classList.remove('flex')
    }

    function fakeGoogleLogin() {
      hideGoogleModal()
      
      // Simulate Google login success
      currentUser = {
        name: "Alex Rivera",
        avatar: "A"
      }
      
      updateLoginUI()
      
      // Optional: small success toast
      const toast = document.createElement('div')
      toast.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#8b5cf6; color:white; padding:16px 24px; border-radius:9999px; box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3);'
      toast.textContent = '✅ Signed in with Google'
      document.body.appendChild(toast)
      setTimeout(() => toast.remove(), 3000)
    }

    function updateLoginUI() {
      const headerLoginBtn = document.getElementById('header-login-btn')
      const headerUser = document.getElementById('header-user')
      const sidebarUserName = document.getElementById('sidebar-user-name')
      
      if (currentUser) {
        headerLoginBtn.classList.add('hidden')
        headerUser.classList.remove('hidden')
        headerUser.classList.add('flex')
        document.getElementById('header-username').textContent = currentUser.name
        document.getElementById('user-avatar').textContent = currentUser.avatar
        
        sidebarUserName.textContent = currentUser.name
        sidebarUserName.classList.remove('hidden')
      } else {
        headerLoginBtn.classList.remove('hidden')
        headerUser.classList.add('hidden')
        headerUser.classList.remove('flex')
        sidebarUserName.textContent = 'Sign in'
        sidebarUserName.classList.add('hidden')
      }
    }

    // Rest of your previous script (createDatabase, renderSidebar, renderHome, etc.) stays exactly the same
    // Just add updateLoginUI() at the end of initializeApp()

    function initializeApp() {
      createDatabase()
      renderSidebar()
      renderHome()
      updateLoginUI()           // ← new line
      console.log('%c✅ Zonely with Google Sign-In is ready!', 'color:#8b5cf6; font-size:18px; font-weight:700')
    }

    window.onload = initializeApp
  </script>
</body>
</html>
